services:
  - type: web
    name: quantumciphersim-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://quantumciphersim.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: quantumciphersim-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: quantumciphersim-db
    plan: free
    databaseName: quantumciphersim
    user: qcsim_user
